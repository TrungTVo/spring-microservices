services:
  consul:
    image: hashicorp/consul:1.22.4
    container_name: consul
    hostname: consul
    command: agent -server -ui -node dev-node -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - '8500:8500'
      - '8600:8600/udp'
    networks:
      - consul-net
  student-service:
    container_name: student-service
    hostname: student-service
    build:
      context: ./student-service/
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    networks:
      - consul-net
  school-service:
    container_name: school-service
    hostname: school-service
    build:
      context: ./school-service/
      dockerfile: Dockerfile
    ports:
      - '8081:8080'
    networks:
      - consul-net

networks:
  consul-net:
    driver: bridge
    name: consul-net
