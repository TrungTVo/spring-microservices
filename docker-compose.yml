services:
  consul:
    image: hashicorp/consul:1.22.4
    container_name: consul
    hostname: consul
    command: agent -server -ui -node dev-node -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - '8500:8500'
      - '8600:8600/udp'
    networks:
      - consul-net
  account-service:
    container_name: account-service
    hostname: account-service
    build:
      context: ./account-service/
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    networks:
      - consul-net
  customer-service:
    container_name: customer-service
    hostname: customer-service
    build:
      context: ./customer-service/
      dockerfile: Dockerfile
    ports:
      - '8081:8080'
    networks:
      - consul-net

networks:
  consul-net:
    driver: bridge
    name: consul-net
