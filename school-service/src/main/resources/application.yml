server:
  port: 8080

spring:
  application:
    name: school-service
  cloud:
    consul:
      host: consul
      port: 8500
      discovery:
        instanceId: ${spring.application.name}:${random.value}
        enabled: true
        register: true # default to be true, if want to deregister -> false
        query-passing: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
